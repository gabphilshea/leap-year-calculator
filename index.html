<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leap Year Calculator</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.png" type="image/png"> 
    <link rel="apple-touch-icon" sizes="57x57" href="/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="/ms-icon-144x144.png">
    <meta name="theme-color" content="#ffffff">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">  
   
</head>
<body>

<div class="main-container">
    <h1 class="title">LEAP YEAR CALCULATOR</h1>
    <h3 class="subtitle">Know if a year is a leap year or not!</h3>
    <br><br>
    <p class="information-card">
        A leap year is a calendar year that contains 366 days (one day more than a standard 365-day year). The extra day, February 29th (often called "leap day"), 
        is added to keep our calendars synchronized with the astronomical seasons.
    </p>

    <div class="calculator-card">
         <div class="input-row">
            <label for="input">Enter year:</label>
            <input type='number' id="yearInput" placeholder=" ex. 2007" />
            
            <div class="keypad">
                <button class="key" onclick="pressKey('1')">1</button>
                <button class="key" onclick="pressKey('2')">2</button>
                <button class="key" onclick="pressKey('3')">3</button>
                <button class="key" onclick="pressKey('4')">4</button>
                <button class="key" onclick="pressKey('5')">5</button>
                <button class="key" onclick="pressKey('6')">6</button>
                <button class="key" onclick="pressKey('7')">7</button>
                <button class="key" onclick="pressKey('8')">8</button>
                <button class="key" onclick="pressKey('9')">9</button>
                <button class="key erase" onclick="eraseKey()">⌫</button>
                <button class="key" onclick="pressKey('0')">0</button>
                <br>
                <button onclick="checkYear()" class="check-button">Check</button>
            </div>
        </div>

        <div class="result-box" id="result">
            <div class="result-title" id="resultLabel"></div>
            <p class="result-detail" id="resultDetail"></p>
        </div>


    </div>
       
</div>
    
<script src="script.js"></script>
</body>
</html>
